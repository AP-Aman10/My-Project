<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Analog Clock</title>
  </head>

  <body>
    <div class="container">
      <div class="clock">
        <div style="--clr: #ff3d58; --h: 74px" id="hour" class="hand">
          <i></i>
        </div>
        <div style="--clr: #00a6ff; --h: 84px" id="min" class="hand">
          <i></i>
        </div>
        <div style="--clr: #ffffff; --h: 94px" id="sec" class="hand">
          <i></i>
        </div>

        <span style="--i: 01"><b>01</b></span>
        <span style="--i: 02"><b>02</b></span>
        <span style="--i: 03"><b>03</b></span>
        <span style="--i: 04"><b>04</b></span>
        <span style="--i: 05"><b>05</b></span>
        <span style="--i: 06"><b>06</b></span>
        <span style="--i: 07"><b>07</b></span>
        <span style="--i: 08"><b>08</b></span>
        <span style="--i: 09"><b>09</b></span>
        <span style="--i: 10"><b>10</b></span>
        <span style="--i: 11"><b>11</b></span>
        <span style="--i: 12"><b>12</b></span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
