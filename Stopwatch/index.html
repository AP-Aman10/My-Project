<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stopwatch">
        <div class="timeDisplay">00:00:00:00</div>
    </div>
    <div class="buttons">
        <button id="stopBtn" class="btn btn1"><i class="fa-solid fa-stop" style="color: #ff0000;"></i>Stop</button>
        <button id="startBtn" class="btn btn2"><i class="fa-solid fa-play" style="color: #73ff00;"></i>Start</button>
        <button id="resetBtm" class="btn btn3"><i class="fa-solid fa-repeat" style="color: #0909fb;"></i>Reset</button>
    </div>
    <script src="https://kit.fontawesome.com/1f86f40e89.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
