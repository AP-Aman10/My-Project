<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="timer">25:00</div>
        <h1 class="title">Click Start for Work Time</h1>
        <div class="buttons">
            <button class="startBtn" style="--clr:green">Start</button>
            <button class="PauseBtn" style="--clr:red">Pause</button>
            <button class="ResumeBtn" style="--clr:purple">Resume</button>
            <button class="ResetBtn" style="--clr:yellow">Reset</button>
        </div>
        <div class="pomoCountDisplay">
            <span class="count">0</span>
            <p>Pomodoro Completed</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
