<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My APP Lab</title>
    <style>
        * {
            box-sizing: border-box;
            font-size: 28px;
            font-weight: 600;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            font: italic;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(to right, #d4ff00, #00ffea);
            background-size: cover;
            background-position: center;
            border: 4px groove #000;
            border-radius: 40px;
        }

        h1 {
            font-size: 100px;
            font-weight: 600;
            color: rgb(0, 0, 0);
        }

        h2 {
            font-size: 100px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.519);
        }

        a:visited {
            color: rgba(255, 0, 0, 0.99);
        }

        img {
            margin: 80px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 4px solid #000;

        }
        img:hover {
            border-radius: 0%;
            transform: scale(1.1);
            transition: 0.5s;
        }
    </style>
</head>
