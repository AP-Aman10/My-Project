<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task & Credential Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css">
</head>

<body class="red">
  <div class="app-container">
    <header>
      <h1><i class="fas fa-tasks"></i> Task & Credential Manager</h1>
      <select id="themeSelector">
        <option value="light">🌞 Light</option>
        <option value="dark">🌑 Dark</option>
      </select>
    </header>

    <main>
      <!-- Credential Manager -->
      <section id="credentials" class="card">
        <h2><i class="fas fa-user-lock"></i> Credentials</h2>
        <form id="loginForm">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required />
            <small class="error" id="emailError"></small>
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 555 123 4567" required />
            <small class="error" id="phoneError"></small>
          </div>

          <div class="input-group">
            <label>Date</label>
            <input type="date" id="date" required />
            <small class="error" id="dateError"></small>
          </div>

          <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="Password" required />
              <button type="button" id="togglePassword"><i class="fas fa-eye"></i></button>
            </div>
            <small class="error" id="passwordError"></small>
          </div>
          <button type="submit">💾 Save</button>
        </form>

        <div id="savedSection" class="hidden">
          <h3>Saved Credentials</h3>
          <p><strong>Email:</strong> <span id="savedEmail"></span></p>
          <p><strong>Phone:</strong> <span id="savedPhone"></span></p>
          <p><strong>Date:</strong> <span id="savedDate"></span></p>
          <p><strong>Password:</strong> <span id="savedPassword"></span></p>
          <button id="deleteData">🗑️ Delete</button>
        </div>
      </section>

      <!-- Task Manager -->
      <section id="taskManager" class="card">
        <h2><i class="fas fa-tasks"></i> Tasks</h2>
        <form id="taskForm">
          <input type="text" id="taskInput" placeholder="Add new task" required />
          <select id="taskCategory">
            <option value="General">General</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
          </select>
          <button type="submit">➕ Add Task</button>
        </form>

        <div class="filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="active">Active</button>
          <button data-filter="completed">Completed</button>
        </div>

        <ul id="taskList"></ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
